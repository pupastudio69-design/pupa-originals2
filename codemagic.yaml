workflows:
  android-release:
    name: Build Android Release APK
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      groups:
        - flutterwave_keys
      vars:
        NODE_VERSION: 20
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release-unsigned.apk
    publishing:
      email:
        recipients:
          - chiemeriek910@gmail.com